  # FBE_heights : [-43.1]  # grid based
  height_range : [6, -7]
  GM_cluster_size : 40
  navi_vector_degree : 25
  navi_point_range : 10
  obstacle_thick : 1

GroundingDINO:
  box_threshold : 0.5
  low_box_threshold : 0.25
  text_threshold : 0.25
  device: 'cuda'

MultiModal:
  model_name : 'gpt-4o'
  temperature : 0

SAM2:
  sam2_checkpoint : "Vision_models/SAM2/checkpoints/sam2_hiera_large.pt"
  cfg_dir : "F:/project/Vision_models/SAM2/sam2_configs/"
  model_cfg : "sam2_hiera_l.yaml"
  
Agent:
  # model_name : 'gpt-3.5-turbo'
  model_name : 'gpt-4'
  temperature : 0
  OPENAI_API_KEY: ""

Simulator:
  route_path : "E:/Workplace/Unreal/CityPark2/Project/Route/route.csv"
  ground_truth_path : "E:/Workplace/Unreal/CityPark2/Project/Location/man/location.csv"

Capture:
  camera : [2] # [0,1,4,2,3]: front -> left -> back -> right -> down

Count:
