Record_root: 'Record/'

Drone:
  ip : "127.0.0.1"
  takeoff_height : -8
  takeoff_speed : 2
  speed : 2
  acceleration : 0.5
  yaw_rate : 15
  yaw_acceleration : 90
  depth_threshold : 500

Explore:
  frontier_size : 5
  frontier_divide_size : 30
  explore_range : 80
  density_map_threshold : 0.5
