Record_root: 'Record/'

Drone:
  ip : "127.0.0.1"
  speed : 2
  yaw_rate : 15
  depth_threshold : 500

Count:
  camera : [0,1,2,4]
  detection_prompt : 'human face.human.person.people.'
  distance_threshold : 40
  same_target_threshold_horiz : 0.5
  same_target_threshold_verti : 2
  max_area : 0.6

GeneralizedLoss:
  density_threshold : 0.4

GroundingDINO:
  box_threshold : 0.4
  low_box_threshold : 0.25
  text_threshold : 0.25
  device: 'cuda'