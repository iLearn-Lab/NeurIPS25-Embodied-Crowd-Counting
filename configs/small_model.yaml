# Configuration for smaller model (faster training/inference)

model:
  in_channels: 3
  base_channels: 32

training:
  batch_size: 16
  num_epochs: 100
  learning_rate: 0.0001
  weight_decay: 0.00001
  num_workers: 4

data:
  root_dir: ./data
  image_size: [512, 512]

logging:
  log_dir: ./logs/small_model
  checkpoint_dir: ./checkpoints/small_model
  save_frequency: 10
